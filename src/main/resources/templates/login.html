<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="auth.loginPageTitle">Please sign in</title>

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/login.css">
</head>
<body>
<div class="container">
    <header class="page-header">
        <h1 data-i18n="auth.loginTitle">Please sign in</h1>
        <p class="subtitle" data-i18n="auth.loginSubtitle">
            Sign in to manage saved locations in Weather 2.0.
        </p>
    </header>

    <!-- Login panel is revealed only after auth check completes. -->
    <section class="panel login-panel" id="login-panel">
        <div th:if="${param.error}" class="message-error login-message" data-i18n="auth.invalidCredentials">
            Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="message-success login-message" data-i18n="auth.loggedOut">
            You have been logged out.
        </div>

        <div th:if="${param.registered}" class="message-success login-message">
            Account created. You can now sign in.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-field">
                <label for="username" data-i18n="auth.usernameLabel">Username</label>
                <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                        autofocus
                >
            </div>

            <div class="form-field">
                <label for="password" data-i18n="auth.passwordLabel">Password</label>
                <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                >
            </div>

            <div class="form-actions">
                <button
                        type="submit"
                        class="btn btn-primary btn-lg login-submit-btn"
                        data-i18n="auth.signInButton"
                >
                    Sign in
                </button>
            </div>

            <p class="login-message">
                No account yet?
                <a href="/register">Create account</a>
            </p>
        </form>
    </section>
</div>

<footer class="footer">
    <div data-i18n="app.footerAuthor">Created by Jakub Heppner</div>
    <div>jakub.heppner@gmail.com</div>
    <div data-i18n="app.footerVersionLabel">App version 2.2</div>
</footer>

<script src="/i18n/messages.en.js"></script>
<script>
    function applyStaticTranslations() {
        document.querySelectorAll("[data-i18n]").forEach((element) => {
            const key = element.dataset.i18n;

            if (element.tagName === "TITLE") {
                document.title = t(key);
                return;
            }

            element.textContent = t(key);
        });
    }

    async function initLoginPage() {
        const loginPanel = document.getElementById("login-panel");

        try {
            const response = await fetch("/api/auth/me", {
                credentials: "same-origin"
            });

            if (response.ok) {
                const auth = await response.json();

                if (auth.authenticated) {
                    window.location.replace("/");
                    return;
                }
            }
        } catch (error) {
            console.error("Could not verify auth state on login page:", error);
        }

        if (loginPanel) {
            loginPanel.style.visibility = "visible";
        }
    }

    applyStaticTranslations();
    initLoginPage();
</script>
</body>
</html>
