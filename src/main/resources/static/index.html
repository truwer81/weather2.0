<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather 2.1</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
    <header class="page-header">
        <h1>Weather 2.1</h1>
        <p class="subtitle">Current weather overview and forecast for saved locations</p>

        <div class="auth-links">
            <a href="/login.html" id="login-link">Login</a>

            <form action="/logout" method="post" class="logout-form" id="logout-form">
                <button type="submit" class="link-button">Logout</button>
            </form>
        </div>
    </header>

    <section class="panel">
        <div class="panel-header">
            <h2>Saved locations</h2>
            <button id="reload-all-btn" type="button">Reload list</button>
        </div>

        <div id="message"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Location</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Region</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Country</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Temp.</span>
                            <span class="th-unit">°C</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Feels<br>like</span>
                            <span class="th-unit">°C</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Humidity</span>
                            <span class="th-unit">%</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Pressure</span>
                            <span class="th-unit">hPa</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Wind<br>speed</span>
                            <span class="th-unit">km/h</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Clouds</span>
                            <span class="th-unit">%</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Desc.</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Order</span>
                        </div>
                    </th>
                    <th>
                        <div class="th-stack">
                            <span class="th-title">Actions</span>
                        </div>
                    </th>
                </tr>
                </thead>
                <tbody id="cities-table-body"></tbody>
            </table>
        </div>
    </section>

    <section class="panel" id="city-form-panel">
        <h2>Location</h2>

        <form id="city-form">
            <input type="hidden" id="editing-id">

            <div class="form-scroll">
                <div class="grid">
                    <div class="form-field">
                        <label for="city">Name or label</label>
                        <input type="text" id="city" name="city" placeholder="required" required>
                    </div>

                    <div class="form-field">
                        <label for="region">Region</label>
                        <input type="text" id="region" name="region" placeholder="optional">
                    </div>

                    <div class="form-field">
                        <label for="country">Country</label>
                        <input type="text" id="country" name="country" placeholder="required" required>
                    </div>

                    <div class="form-field">
                        <label for="longitude">Longitude</label>
                        <input type="number" step="any" id="longitude" name="longitude" placeholder="e.g. 21.0122" required>
                    </div>

                    <div class="form-field">
                        <label for="latitude">Latitude</label>
                        <input type="number" step="any" id="latitude" name="latitude" placeholder="e.g. 52.2297" required>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" id="submit-btn" class="primary-btn">Add location</button>
                <button type="button" id="cancel-edit-btn" hidden>Cancel edit</button>
            </div>
        </form>
    </section>
</div>

<footer class="footer">
    <div>Created by Jakub Heppner</div>
    <div>jakub.heppner@gmail.com</div>
    <div>Version 2.0</div>
</footer>

<script src="/app.js"></script>
</body>
</html>
