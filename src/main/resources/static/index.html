<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title">Weather 2.0</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
    <header class="page-header">
        <h1 data-i18n="app.title">Weather 2.0</h1>
        <p class="subtitle" data-i18n="app.subtitle">
            Current weather overview and forecast for saved locations
        </p>


        <div class="auth-nav">
            <div class="auth-links">
                <a href="/login" id="login-link" data-i18n="auth.loginLink">Sign in</a>
                <a href="/register" id="register-link" data-i18n="auth.registerLink">Create account</a>

                <form action="/logout" method="post" class="logout-form" id="logout-form">
                    <button type="submit" class="link-button" data-i18n="auth.logoutLink">Logout</button>
                </form>
            </div>

            <div class="auth-status" id="auth-status" hidden></div>
        </div>
    </header>

    <!-- Saved locations overview -->
    <section class="panel">
        <div class="panel-header">
            <h2 data-i18n="sections.savedLocations">Saved locations</h2>
            <button
                    id="reload-all-btn"
                    type="button"
                    class="btn btn-secondary btn-toolbar btn-md"
                    data-i18n="buttons.reloadList"
            >
                Reload list
            </button>
        </div>

        <!-- Runtime messages rendered by JavaScript -->
        <div id="message"></div>

        <div class="table-wrapper">
            <table class="locations-table">
                <thead>
                <tr>
                    <th class="col-location">
                        <div class="th-stack">
                            <span class="th-title" data-i18n="labels.location">Location</span>
                        </div>
                    </th>

                    <th class="col-num">
                        <div class="th-stack">
                            <span class="th-title" data-i18n="labels.temperatureShort">Temp.</span>
                            <span class="th-unit" data-i18n="units.temperature">°C</span>
                        </div>
                    </th>

                    <th class="col-num">
                        <div class="th-stack">
                            <span class="th-title" data-i18n="labels.feelsLikeShort">Feels like</span>
                            <span class="th-unit" data-i18n="units.temperature">°C</span>
                        </div>
                    </th>

                    <th class="col-num">
                        <div class="th-stack">
                            <span class="th-title" data-i18n="labels.humidity">Humidity</span>
                            <span class="th-unit" data-i18n="units.humidity">%</span>
                        </div>
                    </th>

                    <th class="col-num">
                        <div class="th-stack">
                            <span class="th-title" data-i18n="labels.pressure">Pressure</span>
                            <span class="th-unit" data-i18n="units.pressure">hPa</span>
                        </div>
                    </th>

                    <th class="col-num">
                        <div class="th-stack">
                            <span class="th-title" data-i18n="labels.windSpeed">Wind speed</span>
                            <span class="th-unit" data-i18n="units.windSpeed">km/h</span>
                        </div>
                    </th>

                    <th class="col-num">
                        <div class="th-stack">
                            <span class="th-title" data-i18n="labels.clouds">Clouds</span>
                            <span class="th-unit" data-i18n="units.clouds">%</span>
                        </div>
                    </th>

                    <th class="col-desc">
                        <div class="th-stack">
                            <span class="th-title" data-i18n="labels.descriptionShort">Desc.</span>
                        </div>
                    </th>

                    <th class="col-actions">
                        <div class="th-stack">
                            <span class="th-title" data-i18n="labels.actions">Actions</span>
                        </div>
                    </th>
                </tr>
                </thead>

                <tbody id="locations-table-body"></tbody>
            </table>
        </div>
    </section>

    <!-- Location create/edit form -->
    <section class="panel" id="location-form-panel">
        <h2 data-i18n="sections.manageLocations">Manage locations</h2>

        <!-- Search UI is injected by JavaScript -->
        <div id="location-search-container"></div>

        <form id="location-form">
            <input type="hidden" id="editing-location-id">

            <div class="form-scroll">
                <div class="grid">
                    <div class="form-field">
                        <label for="name" data-i18n="labels.name">Name or label</label>
                        <input
                                type="text"
                                id="name"
                                name="name"
                                placeholder="required"
                                data-i18n-placeholder="placeholders.name"
                                required
                        >
                    </div>

                    <div class="form-field">
                        <label for="region" data-i18n="labels.region">Region</label>
                        <input
                                type="text"
                                id="region"
                                name="region"
                                placeholder="optional"
                                data-i18n-placeholder="placeholders.region"
                        >
                    </div>

                    <div class="form-field">
                        <label for="country" data-i18n="labels.country">Country</label>
                        <input
                                type="text"
                                id="country"
                                name="country"
                                placeholder="required"
                                data-i18n-placeholder="placeholders.country"
                                required
                        >
                    </div>

                    <div class="form-field">
                        <label for="longitude" data-i18n="labels.longitude">Longitude</label>
                        <input
                                type="number"
                                id="longitude"
                                name="longitude"
                                step="any"
                                placeholder="e.g. 21.0122"
                                data-i18n-placeholder="placeholders.longitude"
                                required
                        >
                    </div>

                    <div class="form-field">
                        <label for="latitude" data-i18n="labels.latitude">Latitude</label>
                        <input
                                type="number"
                                id="latitude"
                                name="latitude"
                                step="any"
                                placeholder="e.g. 52.2297"
                                data-i18n-placeholder="placeholders.latitude"
                                required
                        >
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button
                        type="submit"
                        id="submit-btn"
                        class="btn btn-primary btn-lg"
                        data-i18n="buttons.addLocation"
                >
                    Add location
                </button>

                <button
                        type="button"
                        id="cancel-edit-btn"
                        class="btn btn-secondary btn-md"
                        data-i18n="buttons.cancel"
                        hidden
                >
                    Cancel
                </button>
            </div>
        </form>
    </section>
</div>

<footer class="footer">
    <div data-i18n="app.footerAuthor">Created by Jakub Heppner</div>
    <div>jakub.heppner@gmail.com</div>
    <div data-i18n="app.footerVersionLabel">App version 2.2</div>
</footer>

<script src="/i18n/messages.en.js"></script>
<script>
    function applyStaticTranslations() {
        document.querySelectorAll("[data-i18n]").forEach((element) => {
            const key = element.dataset.i18n;

            if (element.tagName === "TITLE") {
                document.title = t(key);
                return;
            }

            element.textContent = t(key);
        });

        document.querySelectorAll("[data-i18n-placeholder]").forEach((element) => {
            const key = element.dataset.i18nPlaceholder;
            element.placeholder = t(key);
        });
    }

    applyStaticTranslations();
</script>
<script src="/app.js"></script>
</body>
</html>
