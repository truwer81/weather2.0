spring.application.name=weather

spring.datasource.url=jdbc:postgresql://localhost:5433/weatherForecast
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

weather.api.openweather.base-url=https://api.openweathermap.org/data/2.5/weather
weather.api.openweather.key=${OPENWEATHER_API_KEY}

