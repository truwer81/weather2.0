spring.application.name=weather

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/weatherForecast}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

weather.api.openweather.base-url=https://api.openweathermap.org/data/2.5
weather.api.openweather.key=${OPENWEATHER_API_KEY}