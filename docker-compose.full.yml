services:
  postgres-database:
    image: postgres:17
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: weatherForecast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_full_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./src/main/resources/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro

  weather-app:
    build: .
    depends_on:
      - postgres-database
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres-database:5432/weatherForecast
      DB_USER: postgres
      DB_PASSWORD: postgres
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}

volumes:
  postgres_full_data: